<div class="birthday-theme-wrapper">
  <div class="card-container">
    <form nz-form nzLayout="vertical" [formGroup]="loginForm" (ngSubmit)="submit()">
      <h2 class="form-title">🎉 Good to See You Again!</h2>
      <p class="form-subtitle">Sign in to view birthdays</p>

      <nz-form-item>
        <nz-form-label>Email</nz-form-label>
        <nz-form-control>
          <input nz-input formControlName="email" type="email" placeholder="email@example.com" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Password</nz-form-label>
        <nz-form-control>
          <nz-input-group [nzSuffix]="suffixTemplate">
            <input nz-input 
                   [type]="passwordVisible ? 'text' : 'password'" 
                   formControlName="password" 
                   placeholder="********" />
          </nz-input-group>
          <ng-template #suffixTemplate>
            <span nz-icon 
                  [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" 
                  (click)="passwordVisible = !passwordVisible"
                  style="cursor: pointer;">
            </span>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <label nz-checkbox formControlName="remember">
          <span>Remember me</span>
        </label>
      </nz-form-item>

      <button nz-button nzType="primary" class="form-button" type="submit">
        Login
      </button>

      <div class="link-container">
        <a routerLink="/register" class="link">New here? Create an account.</a>
      </div>
    </form>
  </div>
</div>
