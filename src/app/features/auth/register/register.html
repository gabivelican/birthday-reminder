<div class="birthday-theme-wrapper">
  <div class="card-container">
    <form nz-form nzLayout="vertical" [formGroup]="registerForm" (ngSubmit)="submit()">
      <h2 class="form-title">🎁 Create Account</h2>
      <p class="form-subtitle">Join the Birthday Reminder community</p>

      <nz-form-item>
        <nz-form-label nzRequired>Email</nz-form-label>
        <nz-form-control [nzValidateStatus]="registerForm.get('email')!" nzErrorTip="Invalid email!">
          <input nz-input formControlName="email" type="email" placeholder="name@example.com" />
        </nz-form-control>
      </nz-form-item>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <nz-form-item>
          <nz-form-label nzRequired>First Name</nz-form-label>
          <nz-form-control nzErrorTip="Required!">
            <input nz-input formControlName="firstName" placeholder="First Name" />
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzRequired>Last Name</nz-form-label>
          <nz-form-control nzErrorTip="Required!">
            <input nz-input formControlName="lastName" placeholder="Last Name" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <nz-form-item>
        <nz-form-label nzRequired>Password</nz-form-label>
        <nz-form-control [nzValidateStatus]="registerForm.get('password')!" nzErrorTip="Password too weak!">
          <nz-input-group [nzSuffix]="passSuffix">
            <input nz-input [type]="passwordVisible ? 'text' : 'password'" formControlName="password" placeholder="Choose a password" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzRequired>Confirm Password</nz-form-label>
        <nz-form-control [nzValidateStatus]="registerForm.hasError('mismatch') ? 'error' : ''" nzErrorTip="Passwords do not match!">
          <nz-input-group [nzSuffix]="confirmSuffix">
            <input nz-input [type]="confirmPasswordVisible ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Repeat password" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <ng-template #passSuffix>
        <span nz-icon [nzType]="passwordVisible ? 'eye-invisible' : 'eye'" (click)="passwordVisible = !passwordVisible" style="cursor: pointer;"></span>
      </ng-template>
      <ng-template #confirmSuffix>
        <span nz-icon [nzType]="confirmPasswordVisible ? 'eye-invisible' : 'eye'" (click)="confirmPasswordVisible = !confirmPasswordVisible" style="cursor: pointer;"></span>
      </ng-template>

      <button nz-button nzType="primary" class="form-button" [disabled]="registerForm.invalid" type="submit">
        Register
      </button>

      <div class="link-container">
        <a routerLink="/login" class="link">Already have an account? Sign in</a>
      </div>
    </form>
  </div>
</div>
